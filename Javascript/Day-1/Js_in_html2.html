<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Static Data Alert</title>
</head>
<body>

  <h2>Static Data Example</h2>
  <button id="showAlertBtn">Show User Data</button>

 <script>
  const userData = {
    name: "Ram",
    age: 19,
    maritalStatus: "", 
  };
  if (userData.age >= 19) {
    userData.maritalStatus = "Is Married";
  } else {
    userData.maritalStatus = "Is Not Married";
  }

  document.getElementById("showAlertBtn").addEventListener("click", () => {
    let message = "User Data:\n";
    message += ` ${userData.name}\n`;
    message += `${userData.age}\n`;
    message += `${userData.maritalStatus}\n`;

    alert(message);
  });
</script>

</body>
</html>
